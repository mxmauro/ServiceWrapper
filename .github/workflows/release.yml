name: Release Build

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-2025-vs2026

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup up MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: "[18.0,19.0)"

      - name: Build Release x64
        shell: pwsh
        run: >
          msbuild .\ServiceWrapper.slnx /t:Rebuild /p:Configuration=Release /p:Platform=x64

      - name: Upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/sw.exe
            bin/sw.pdb
